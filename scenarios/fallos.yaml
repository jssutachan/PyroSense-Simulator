# Escenario de fallos (E5): estresa el pipeline con las patologías reales
# de una red IoT en campo. El FaultInjector envuelve el flujo de mensajes
# (ADR-0012) — los nodos siguen sanos; lo que falla es la red y el campo.
# El bloque `faults:` es componible: cópialo sobre baseline o sobre
# replay_enero_2024 para combinar fuego + fallos.
name: fallos
description: >
  Operación con red degradada: nodos que callan por intervalos, un
  gateway completo que se desconecta 3 h y retransmite su backlog en
  ráfaga con timestamps viejos, duplicados QoS 1, desorden local y
  baterías degradándose aceleradamente.
start_time: "2026-04-15T00:00:00Z"
duration_hours: 24.0
seed: 20260415

environment: # línea base húmeda (idéntica a baseline.yaml)
  temp_mean_c: 13.0
  temp_amplitude_c: 5.0
  temp_peak_hour: 14.0
  lapse_rate_c_per_km: -6.5
  reference_elevation_m: 2600.0
  rh_mean_pct: 85.0
  rh_amplitude_pct: 10.0
  wind_speed_mean_ms: 2.0
  wind_dir_mean_deg: 100.0
  smoke_baseline_ppm: 0.02

faults:
  node_dropout: # 15% de los nodos calla 10 min de cada hora
    fraction: 0.15
    period_min: 60.0
    window_min: 10.0
  burst_reconnect: # todo GW-01 offline de las 02:00 a las 05:00;
    gateway_id: GW-01 #   al volver, ráfaga con ts_device ORIGINALES
    offline_from_hour: 2.0
    offline_hours: 3.0
  duplicates: # at-least-once de MQTT QoS 1
    probability: 0.05
  out_of_order: # permutación local en ventanas de 4 mensajes
    window: 4
  battery_decay: # degradación acelerada -> LOW_BATTERY/DEGRADED
    extra_pct_per_day: 120.0
    low_pct: 20.0
    degraded_pct: 10.0
