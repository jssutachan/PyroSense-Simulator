# Replay paramétrico del incendio de los Cerros Orientales (enero 2024).
#
# Referencia real: el 22 de enero de 2024 se declaró un incendio en la zona
# de El Cable / quebrada La Vieja, con ignición atribuida a fogatas cerca de
# senderos, en plena temporada seca intensificada por El Niño. Creció lento
# en la madrugada y el viento del oriente lo aceleró ladera abajo hacia la
# ciudad durante la mañana, hasta un orden de ~12 ha equivalentes.
#
# NADA de esto es física de propagación: es interpolación paramétrica
# (ADR-0011) calibrada para producir la FIRMA de ese evento en la
# telemetría: correlación espacial multi-sensor, temp↑ / rh↓ / smoke↑↑.
name: replay_enero_2024
description: >
  Ignición nocturna cerca de senderos en la zona El Cable, día seco de
  El Niño; crecimiento lento inicial y empuje del viento hacia la ladera
  occidental horas después.
start_time: "2026-01-22T00:00:00Z"
duration_hours: 12.0
seed: 20240122

environment: # mismas condiciones que temporada_seca (El Niño)
  temp_mean_c: 17.0
  temp_amplitude_c: 8.0
  temp_peak_hour: 13.5
  lapse_rate_c_per_km: -6.5
  reference_elevation_m: 2600.0
  rh_mean_pct: 50.0
  rh_amplitude_pct: 20.0
  wind_speed_mean_ms: 4.5
  wind_dir_mean_deg: 95.0
  smoke_baseline_ppm: 0.03

fires:
  - epicenter_lon: -74.052 # zona El Cable / La Vieja (aprox.)
    epicenter_lat: 4.605
    start_hour: 2.5 # ignición nocturna ~02:30
    initial_radius_m: 90.0 # ~2.5 ha iniciales (r = sqrt(A/pi))
    growth_rate_m_per_min: 1.0 # crecimiento radial lento
    wind_bias: # el viento del oriente empuja el frente
      east_m_per_min: -2.0 #   hacia el occidente (la ciudad)
      north_m_per_min: 0.5
    ramp_minutes: 30.0 # la firma térmica tarda ~30 min en plenitud
    halo_m: 250.0 # humo/calor perceptible más allá del frente
    peak_temp_delta_c: 22.0
    peak_rh_drop_pct: 25.0
    peak_smoke_ppm: 45.0
