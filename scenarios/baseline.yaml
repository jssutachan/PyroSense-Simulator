# Baseline scenario: 24 hours of healthy operation in the wet season.
# No fire, no faults — the reference against which the El Niño
# (dry_season.yaml) and fire (january_2024_replay.yaml) scenarios are compared.
name: baseline
description: >
  A typical wet-season day in the Cerros Orientales: cool, humid, gentle
  winds. No node should ever enter its alert cadence.
start_time: "2026-04-15T00:00:00Z"
duration_hours: 24.0
seed: 20260415

environment:
  temp_mean_c: 13.0
  temp_amplitude_c: 5.0
  temp_peak_hour: 14.0
  lapse_rate_c_per_km: -6.5
  reference_elevation_m: 2600.0
  rh_mean_pct: 85.0
  rh_amplitude_pct: 10.0
  wind_speed_mean_ms: 2.0
  wind_dir_mean_deg: 100.0
  smoke_baseline_ppm: 0.02
