# ─────────────────────────────────────────────────────────────────────
# PyroSense site-planner — planning parameters
# Copy to params.yaml and adjust. Every value is optional: anything
# absent takes the default shown here.
# Usage: site-planner generate --dem ... --aoi ... --config params.yaml
# ─────────────────────────────────────────────────────────────────────

# Effective detection radius per node (m). Documents the coverage
# assumption behind the densities; d = r·√3 ≈ 216 m at full coverage.
detection_radius_m: 125.0

# Target density per tier, in hectares per node
# (T1: wildland-urban interface/trails; T2: pine/eucalyptus; T3: rest).
densities_ha:
  t1: 4.0
  t2: 10.0
  t3: 25.0

# Maximum jitter applied to each grid position (m, per axis).
jitter_m: 25.0

# Maximum installable slope (degrees); anything above it is relocated
# to the nearest valid neighbour.
max_slope_deg: 45.0

# Seed for ALL randomness: same seed + same inputs = byte-identical plan.
seed: 0

# Nodes per gateway used to size ceil(n/capacity) gateways.
gateway_capacity: 60

# Radius (m) searched around each centroid for the highest ground.
gateway_snap_radius_m: 200.0

# Width (m) of the T1 strip derived from the AOI's western edge when
# no custom zone polygons are provided.
t1_buffer_m: 400.0

# GeoJSON with custom tier polygons (properties: tier, zone_name).
# When set, it replaces the default derivation.
# zones_geojson: config/zones.geojson
