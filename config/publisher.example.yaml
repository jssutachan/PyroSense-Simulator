# ─────────────────────────────────────────────────────────────────────
# Configuration reference for the three fleet-sim publishers.
#
# Transport SELECTION happens on the CLI (`--publisher stdout|file|mqtt`);
# this file documents each transport's knobs and where they come from.
# ─────────────────────────────────────────────────────────────────────

stdout:
  # No configuration: one NDJSON line per payload on the data channel
  # (stdout); logs go to stderr (ADR-0010). Ideal for pipes and development.

file:
  # Configured via CLI:
  #   --out out/telemetry.ndjson   (destination file; the directory is created)
  # Size-based rotation: <file>.1, <file>.2, ... (1 MB by default).

mqtt:
  # Connection: environment variables / .env (see .env.example) — NEVER
  # in committed files:
  #   PYROSENSE_IOT_ENDPOINT        AWS IoT Core ATS endpoint
  #   PYROSENSE_CERT_PATH           device X.509 certificate
  #   PYROSENSE_PRIVATE_KEY_PATH    private key (never logged)
  #   PYROSENSE_ROOT_CA_PATH        Amazon root CA
  #   PYROSENSE_TOPIC_BASE          default: pyrosense
  #   PYROSENSE_ENV                 dev | staging | prod
  #
  # Resulting topic: {topic_base}/{env}/telemetry/{device_id} at QoS 1.
  # At-least-once consequence: DEDUPLICATION by device_id+seq is the
  # cloud's responsibility (ADR-0013).
  #
  # Behavior (code defaults, injectable):
  #   max_retries: 5            retries per payload before dropping it
  #   base_backoff_s: 0.5       exponential backoff + jitter
  #   max_backoff_s: 30.0
  #   metrics_interval_s: 30.0  metrics log (sent/failed/retries)
